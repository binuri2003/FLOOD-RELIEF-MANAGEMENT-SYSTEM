<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="adminFrontend.css">
</head>
<body>

<h1>Admin Panel</h1>

<div class="nav">
    <button onclick="showSection('users')">View Users</button>
    <button onclick="showSection('reports')">View Reports</button>
    <button onclick="logout()">Logout</button>
</div>

<div id="users" class="section">
    <h2>Registered Users</h2>

    <div id="individualReport" class="report-container" style="display:none;">
        <h3 class="report-title">Detailed User Summary Report</h3>
        <div id="reportContent"></div>
        <button type="button" class="btn-close" onclick="document.getElementById('individualReport').style.display='none'">Close Report</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>User Name</th>
                    <th>Address</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>
    </div>
</div>

<div id="reports" class="section" style="display:none;">
    <h2>System Summary</h2>
    <select id="areaFilter" onchange="loadSummary()">
        <option value="All">All Areas</option>
        <option value="Colombo">Colombo</option>
        <option value="Gampaha">Gampaha</option>
        <option value="Kalutara">Kalutara</option>
        </select>

    <select id="reliefFilter" onchange="loadSummary()">
        <option value="Food">Food</option>
        <option value="Medicine">Medicine</option>
        <option value="Water">Water</option>
        <option value="Shelter">Shelter</option>
    </select>
    
    <ul id="summaryValues">
        </ul>
</div>

<script src="admin.js"></script>
</body>
</html>
